; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:upesy_wroom]
platform = https://github.com/pioarduino/platform-espressif32/archive/refs/tags/54.03.20-rc2.zip
board = upesy_wroom
monitor_speed = 112500
framework = arduino
lib_deps = 
	mikalhart/TinyGPSPlus@^1.1.0
	vshymanskyy/TinyGSM@^0.12.0
	bodmer/TFT_eSPI@^2.5.43
	bblanchon/ArduinoJson@^7.4.1
	adafruit/Adafruit ADS1X15@^2.5.0
	https://github.com/PaulStoffregen/OneWire
	fastled/FastLED@^3.9.14
	xreef/EByte LoRa E22 library@^1.0.9
	; jgromes/RadioLib@^7.3.0
	xreef/PCF8575 library@^2.0.0
	; sandeepmistry/LoRa@^0.8.0
	bblanchon/ArduinoJson@^7.4.2

[platformio]
default_envs = upesy_wroom

[env:test]
platform = https://github.com/pioarduino/platform-espressif32/archive/refs/tags/54.03.20-rc2.zip
framework = arduino
monitor_speed = 115200
monitor_filters = 
	default
	esp32_exception_decoder
lib_deps = 
	xreef/EByte LoRa E22 library@^1.0.9
	; jgromes/RadioLib@^7.3.0
	xreef/PCF8575 library@^2.0.0

[env:T-Call-SIM800]
board = esp32dev
build_flags = 
	${env.build_flags}
	-DCORE_DEBUG_LEVEL=0
	-DBOARD_HAS_PSRAM
lib_deps = 
	mikalhart/TinyGPSPlus@^1.1.0
	vshymanskyy/TinyGSM@^0.12.0
	bodmer/TFT_eSPI@^2.5.43
	bblanchon/ArduinoJson@^7.4.1
	xreef/EByte LoRa E22 library@^1.0.9
	; jgromes/RadioLib@^7.3.0
	xreef/PCF8575 library@^2.0.0